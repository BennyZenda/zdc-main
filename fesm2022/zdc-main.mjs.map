@if (isMobile) {
  <nz-drawer [nzClosable]="false" [nzVisible]="visible()" nzPlacement="bottom" [nzHeight]="nzDrawerheight()" [nzWrapClassName]="'nzDrawerWrapper ' + drawerClassName()">
    <ng-container *nzDrawerContent>
      <div class="drawer-container" dir="auto">
        @if (showCloseButton()) {
          <div class="drawer-header">
            <div class="bar" [ngClass]="{'hide': !bar()}"></div>
            <div class="closeCricle" (click)="onClose.emit()">
              <svg width="9" height="9" viewBox="0 0 9 9" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M8.47814 0.375526C8.71672 0.492386 8.9407 0.799142 8.98939 1.07668C9.01374 1.17893 8.99426 1.34448 8.95044 1.5003C8.88227 1.73402 8.77515 1.85574 7.43614 3.18989L5.99975 4.62628L7.40693 6.03833C8.18112 6.81252 8.84819 7.51855 8.88714 7.59645C9.13547 8.08824 8.94557 8.67253 8.46353 8.92086C8.25902 9.02798 7.8208 9.02311 7.60656 8.91112C7.51405 8.86243 6.79828 8.19536 6.02409 7.42116L4.60717 6.01399L3.22434 7.40656C2.43554 8.19536 1.75386 8.83808 1.64187 8.89651C1.22799 9.11562 0.668044 8.97442 0.414849 8.58976C0.24443 8.33169 0.205477 7.90808 0.327205 7.66462C0.371027 7.57211 1.04784 6.85635 1.8269 6.07728L3.24869 4.65063L1.8269 3.22397C0.896894 2.29397 0.375896 1.73888 0.327205 1.62203C-0.00876522 0.813749 0.814118 -0.00426579 1.59318 0.360919C1.71978 0.419349 2.27973 0.945215 3.17565 1.84601C3.9401 2.61046 4.58283 3.23858 4.61204 3.23858C4.63639 3.23858 5.29372 2.60559 6.07278 1.82653C7.00766 0.896524 7.54813 0.395003 7.66499 0.341443C7.91818 0.239191 8.22494 0.248929 8.47814 0.375526Z" fill="black"/>
              </svg>
            </div>
          </div>
        }
        <div class="drawer-inner-container">
          <div class="drawer-content">
            <ng-container *ngTemplateOutlet="contentTpl" />
          </div>
        </div>
      </div>
    </ng-container>
  </nz-drawer>
}


@if (!isMobile) {
  <nz-modal [nzWrapClassName]="'nzModalWrapper ' + drawerClassName()" [(nzVisible)]="visible" [nzWidth]="nzModalWidth()" [nzFooter]="null" [nzClosable]="false" [nzCentered]="true" [nzContent]="content" [nzAutofocus]="autoFocus()">
    <ng-template #content>
      <div class="modal-container" dir="auto">
        @if (showCloseButton()) {
          <div class="modal-header">
            <div class="closeCricle" (click)="onClose.emit()">
              <svg width="9" height="9" viewBox="0 0 9 9" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M8.47814 0.375526C8.71672 0.492386 8.9407 0.799142 8.98939 1.07668C9.01374 1.17893 8.99426 1.34448 8.95044 1.5003C8.88227 1.73402 8.77515 1.85574 7.43614 3.18989L5.99975 4.62628L7.40693 6.03833C8.18112 6.81252 8.84819 7.51855 8.88714 7.59645C9.13547 8.08824 8.94557 8.67253 8.46353 8.92086C8.25902 9.02798 7.8208 9.02311 7.60656 8.91112C7.51405 8.86243 6.79828 8.19536 6.02409 7.42116L4.60717 6.01399L3.22434 7.40656C2.43554 8.19536 1.75386 8.83808 1.64187 8.89651C1.22799 9.11562 0.668044 8.97442 0.414849 8.58976C0.24443 8.33169 0.205477 7.90808 0.327205 7.66462C0.371027 7.57211 1.04784 6.85635 1.8269 6.07728L3.24869 4.65063L1.8269 3.22397C0.896894 2.29397 0.375896 1.73888 0.327205 1.62203C-0.00876522 0.813749 0.814118 -0.00426579 1.59318 0.360919C1.71978 0.419349 2.27973 0.945215 3.17565 1.84601C3.9401 2.61046 4.58283 3.23858 4.61204 3.23858C4.63639 3.23858 5.29372 2.60559 6.07278 1.82653C7.00766 0.896524 7.54813 0.395003 7.66499 0.341443C7.91818 0.239191 8.22494 0.248929 8.47814 0.375526Z" fill="black"/>
              </svg>
            </div>
          </div>
        }
        <div class="modal-inner-container">
          <div class="modal-content">
            <ng-container *ngTemplateOutlet="contentTpl" />
          </div>
        </div>
      </div>
    </ng-template>
  </nz-modal>
}


<ng-template #contentTpl><ng-content /></ng-template>
